input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["cns-alerts"]
    group_id => "logstash-consumer"
    codec => "json"
    auto_offset_reset => "earliest"
  }
}

filter {
  # Normalize Snort 3 fields to SIEM standard
  if [proto] {
    mutate { rename => { "proto" => "protocol" } }
  }
  if [src_addr] {
    mutate { rename => { "src_addr" => "src_ip" } }
  }
  if [dst_addr] {
    mutate { rename => { "dst_addr" => "dst_ip" } }
  }
  
  # Ensure severity is consistent
  if ![severity] {
    if [rule][priority] == 1 {
      mutate { add_field => { "severity" => "CRITICAL" } }
    } else if [rule][priority] == 2 {
      mutate { add_field => { "severity" => "HIGH" } }
    } else {
      mutate { add_field => { "severity" => "LOW" } }
    }
  }

  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
    # Remove sensitive Snort raw data if needed (uncomment for production)
    # remove_field => ["raw_payload"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cns-alerts-%{+YYYY.MM.dd}"
  }
  # Enable for debugging (stdout)
  # stdout { codec => rubydebug }
}
